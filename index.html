<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel Dragon Island</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div id="gameWrap">
    <header id="topBar">
      <div class="logo">🐉 Pixel Dragon Island</div>

      <div class="moneyBox">
        <span>🪙 <b id="goldText">500</b></span>
        <span>🍖 <b id="foodText">100</b></span>
        <span>💎 <b id="gemText">25</b></span>
      </div>

      <button id="marketBtn">MARKET</button>
    </header>

    <main id="gameArea">
      <canvas id="gameCanvas" width="960" height="640"></canvas>
    </main>

    <div id="hint">
      Tile seç → Habitat koy → Ejderha al → Adada yaşasın
    </div>
  </div>

  <div id="marketPanel" class="hidden">
    <div class="marketHeader">
      <h2>MARKET</h2>
      <button id="closeMarket">X</button>
    </div>

    <div class="marketGrid">
      <button class="buyBtn" data-buy="habitat">
        <b>Habitat</b>
        <span>150 Altın</span>
      </button>

      <button class="buyBtn" data-buy="fire">
        <b>Ateş Ejderhası</b>
        <span>5 Elmas</span>
      </button>

      <button class="buyBtn" data-buy="water">
        <b>Su Ejderhası</b>
        <span>5 Elmas</span>
      </button>

      <button class="buyBtn" data-buy="nature">
        <b>Doğa Ejderhası</b>
        <span>5 Elmas</span>
      </button>

      <button class="buyBtn" data-buy="electric">
        <b>Elektrik Ejderhası</b>
        <span>8 Elmas</span>
      </button>

      <button class="buyBtn" data-buy="shadow">
        <b>Gölge Ejderhası</b>
        <span>10 Elmas</span>
      </button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
