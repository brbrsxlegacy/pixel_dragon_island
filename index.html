<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- MOBİL UYUMLU -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Dragon Island PRO</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== GAME ROOT ===== -->
<div id="game-container">

    <!-- CANVAS -->
    <canvas id="game" width="1024" height="576"></canvas>

    <!-- ===== UI OVERLAY ===== -->
    <div id="ui">

        <!-- ÜST BAR -->
        <div id="topbar">
            <div class="res gold">🪙 <span id="gold">0</span></div>
            <div class="res food">🍖 <span id="food">0</span></div>
            <div class="res gems">💎 <span id="gems">0</span></div>

            <button id="marketBtn">MARKET</button>
        </div>

        <!-- ===== MARKET PANEL ===== -->
        <div id="marketPanel" class="panel hidden">
            <h2>Market</h2>

            <div class="item" data-type="habitat">
                <b>Habitat</b>
                <span>100 Altın</span>
            </div>

            <div class="item" data-type="dragon">
                <b>Ejderha</b>
                <span>5 💎</span>
            </div>

            <button id="closeMarket">Kapat</button>
        </div>

    </div>
</div>

<!-- JS -->
<script src="game.js"></script>

</body>
</html>
